<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧停车收费系统</title>
<style>
:root{--bg:#f0f4f8;--card:#fff;--card2:#f7f9fb;--border:#e2e8f0;--border2:#cbd5e1;--text:#1a202c;--text2:#64748b;--text3:#94a3b8;--accent:#3b82f6;--accent2:#6366f1;--accent3:#10b981;--green:#10b981;--red:#ef4444;--red2:#dc2626;--orange:#f97316;--yellow:#f59e0b;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:20px}
.app{width:100%;max-width:1100px;display:flex;flex-direction:column;gap:14px}
.header{display:flex;align-items:center;gap:14px;padding:18px 22px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.header-icon{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:21px;color:#fff;flex-shrink:0}
.header h1{font-size:19px;font-weight:700}
.header span{color:var(--text2);font-size:11px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:4px;height:16px;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:2px}
.prov-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-bottom:8px}
.prov-btn{padding:6px 1px;border:1px solid var(--border);border-radius:7px;background:var(--card2);color:var(--text);cursor:pointer;font-size:12px;font-weight:600;text-align:center;transition:all .15s}
.prov-btn:hover{border-color:var(--accent);background:#eef4ff}
.prov-btn.on{border-color:var(--accent);background:var(--accent);color:#fff}
.prov-btn span{display:block;font-size:9px;font-weight:400;opacity:.7}
.prov-btn.on span{opacity:.9}
.plate-row{display:flex;gap:7px;margin-bottom:8px}
.plate-prefix{width:46px;height:46px;border:2px solid var(--accent);border-radius:10px;background:rgba(59,130,246,.05);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:var(--accent);flex-shrink:0}
.plate-city{width:54px;height:46px;border:1px solid var(--border);border-radius:10px;font-size:16px;font-weight:700;color:var(--text);outline:none;cursor:pointer;text-align:center;background:var(--card2)}
.plate-num{flex:1;height:46px;border:1px solid var(--border);border-radius:10px;padding:0 10px;font-size:17px;font-weight:700;color:var(--text);outline:none;letter-spacing:3px;text-transform:uppercase;background:var(--card2)}
.plate-num:focus{border-color:var(--accent)}
.plate-num.err{border-color:var(--red);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}50%{transform:translateX(4px)}75%{transform:translateX(-2px)}}
.msg{font-size:10px;margin-top:-4px;margin-bottom:6px;min-height:14px;color:var(--text3)}
.msg.err{color:var(--red)}
.msg.ok{color:var(--green)}
.types-row{display:flex;gap:5px;margin-bottom:12px}
.type-btn{flex:1;padding:7px 2px;border:1px solid var(--border);border-radius:8px;background:var(--card2);color:var(--text2);cursor:pointer;font-size:11px;font-weight:600;text-align:center;transition:all .15s}
.type-btn.on{border-color:var(--accent);background:rgba(59,130,246,.05);color:var(--accent)}
.btn{width:100%;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-go{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(59,130,246,.2)}
.btn-go:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-exit{background:var(--red);color:#fff}
.btn-exit:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(239,68,68,.2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 10px;font-size:10px;font-weight:600;color:var(--text2);letter-spacing:.5px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card)}
td{padding:9px 10px;font-size:12px;border-bottom:1px solid rgba(226,232,240,.6)}
.badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:9px;font-weight:600}
.badge.green{background:rgba(245,158,11,.1);color:var(--yellow)}
.toggle-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:11px;color:var(--text2)}
.toggle{width:36px;height:19px;border-radius:10px;background:var(--border2);position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:19px}
.fee-box{text-align:center;padding:18px 10px;border-radius:var(--radius);background:var(--card2);border:1px solid var(--border);margin-top:8px}
.fee-num{font-size:38px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.fee-info{color:var(--text2);font-size:11px;margin-top:3px}
.qr-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.qr-img{width:150px;height:150px;border-radius:10px;border:2px solid var(--border);padding:5px;background:#fff}
.qr-info{font-size:10px;color:var(--text2);margin-top:5px}
.qr-btns{display:flex;gap:6px;margin-top:8px}
.qr-btns .btn{flex:1;font-size:11px;padding:8px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;pointer-events:none;box-shadow:0 5px 16px rgba(0,0,0,.18);opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast.err{background:var(--red)}
.toast.ok{background:var(--green)}
.toast.warn{background:var(--orange)}
.pg{display:none}
.pg.on{display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:768px){.grid2{grid-template-columns:1fr}.prov-grid{grid-template-columns:repeat(6,1fr)}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">🅿️</div>
    <div><h1>智慧停车收费系统</h1><span>Smart Parking Fee Management</span></div>
    <button onclick="showSettings()" style="margin-left:auto;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600">⚙️ 费率设置</button>
  </div>

  <div style="display:flex;gap:4px;padding:4px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border)">
    <button onclick="page('park')" id="tabPark" style="flex:1;padding:10px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer">🅿️ 停车管理</button>
    <button onclick="page('stat')" id="tabStat" style="flex:1;padding:10px;border:none;border-radius:10px;background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer">📊 数据统计</button>
  </div>

  <!-- 停车管理 -->
  <div class="pg on" id="pgPark">
    <div class="grid2">
      <div class="card">
        <div class="card-title">车辆入场登记</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:6px">选择省份简称</div>
        <div class="prov-grid" id="provGrid"></div>
        <div class="toggle-row"><div class="toggle" id="nevTg" onclick="togNEV()"></div>新能源车牌</div>
        <div class="plate-row">
          <div class="plate-prefix" id="pref">京</div>
          <select class="plate-city" id="citySel" onchange="onCity()"></select>
          <input class="plate-num" id="numIn" placeholder="12345" maxlength="6" autocomplete="off" oninput="valIn()">
        </div>
        <div class="msg" id="msgIn">格式：5位数字/字母</div>
        <div class="types-row" id="typesRow"></div>
        <button class="btn btn-go" id="btnIn" onclick="enter()">🚘 确认入场</button>
      </div>

      <div class="card">
        <div class="card-title">车辆离场结算</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:6px">选择省份简称</div>
        <div class="prov-grid" id="exitProvGrid"></div>
        <div class="plate-row">
          <div class="plate-prefix" id="exitPref">京</div>
          <select class="plate-city" id="exitCitySel" onchange="onExitCity()"></select>
          <input class="plate-num" id="numOut" placeholder="12345" maxlength="6" autocomplete="off" oninput="valOut()">
        </div>
        <div class="msg" id="msgOut">格式：5位数字/字母</div>
        <button class="btn btn-exit" onclick="checkout()" style="margin-bottom:6px">🚙 结算离场</button>
        <div class="fee-box" id="feeBox" style="display:none">
          <div class="fee-num" id="feeNum">¥0</div>
          <div class="fee-info" id="feeInfo"></div>
          <div style="font-size:11px;color:var(--text2);margin-top:6px;border-top:1px solid var(--border);padding-top:6px" id="feeDetail"></div>
          <div class="qr-wrap" id="qrWrap">
            <div style="font-size:12px;font-weight:600;margin-bottom:4px">📱 扫码支付</div>
            <img class="qr-img" id="qrImg" src="" alt="二维码">
            <div class="qr-info" id="qrRef"></div>
            <div class="qr-btns">
              <button class="btn btn-go" onclick="payOk()" id="payBtn">✅ 确认已付款</button>
              <button class="btn btn-outline" onclick="payNo()">取消</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="grid2" style="margin-top:14px">
      <div class="card">
        <div class="card-title">在场车辆 <span onclick="load()" style="margin-left:auto;font-size:11px;color:var(--accent);cursor:pointer;font-weight:400">刷新 ↻</span></div>
        <div style="max-height:340px;overflow-y:auto"><table><thead><tr><th>车牌号</th><th>类型</th><th>入场时间</th><th>已停时长</th><th>操作</th></tr></thead><tbody id="activeBody"></tbody></table></div>
        <div style="text-align:center;padding:20px;color:var(--text3);font-size:12px" id="activeEmpty">加载中...</div>
      </div>
      <div class="card">
        <div class="card-title">收费记录 <span onclick="load()" style="margin-left:auto;font-size:11px;color:var(--accent);cursor:pointer;font-weight:400">刷新 ↻</span></div>
        <div style="max-height:340px;overflow-y:auto"><table><thead><tr><th>车牌号</th><th>入场</th><th>离场</th><th>金额</th></tr></thead><tbody id="hisBody"></tbody></table></div>
        <div style="text-align:center;padding:20px;color:var(--text3);font-size:12px" id="hisEmpty">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 数据统计 -->
  <div class="pg" id="pgStat">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px">
      <div class="card" style="text-align:center"><div style="font-size:26px;font-weight:800;color:var(--accent)" id="sCars">0</div><div style="font-size:10px;color:var(--text2)">累计服务车辆</div></div>
      <div class="card" style="text-align:center"><div style="font-size:26px;font-weight:800;color:var(--green)" id="sFee">¥0</div><div style="font-size:10px;color:var(--text2)">累计收费总额</div></div>
      <div class="card" style="text-align:center"><div style="font-size:26px;font-weight:800;color:var(--accent2)" id="sAvg">¥0</div><div style="font-size:10px;color:var(--text2)">单车均价</div></div>
      <div class="card" style="text-align:center"><div style="font-size:26px;font-weight:800;color:var(--orange)" id="sDur">0min</div><div style="font-size:10px;color:var(--text2)">平均停车时长</div></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="card-title" style="margin-bottom:0">收费趋势</div>
        <div style="display:flex;gap:3px;background:var(--card2);border-radius:7px;padding:2px">
          <button onclick="chartTab('week')" id="ctWeek" style="padding:4px 10px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:600;cursor:pointer">近7天</button>
          <button onclick="chartTab('month')" id="ctMonth" style="padding:4px 10px;border:none;border-radius:6px;background:transparent;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer">近30天</button>
        </div>
      </div>
      <div style="display:flex;align-items:flex-end;gap:10px;height:150px" id="feeChart"></div>
    </div>
    <div class="grid2" style="margin-bottom:14px">
      <div class="card"><div class="card-title">车型分布</div><div id="typeDist" style="display:flex;flex-direction:column;gap:6px;font-size:12px"></div></div>
      <div class="card"><div class="card-title">繁忙时段</div><div style="display:flex;align-items:flex-end;gap:5px;height:80px" id="peakBars"></div><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:2px"><span>0</span><span>6</span><span>12</span><span>18</span><span>24</span></div></div>
    </div>
    <div class="grid2">
      <div class="card"><div class="card-title">实时在场率</div><div style="display:flex;align-items:center;justify-content:center;gap:18px"><svg width="110" height="110" viewBox="0 0 130 130" style="transform:rotate(-90deg)"><circle fill="none" stroke="var(--border)" stroke-width="8" cx="65" cy="65" r="54"/><circle fill="none" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" id="occRing" cx="65" cy="65" r="54" stroke-dasharray="339.292" stroke-dashoffset="339.292"/></svg><div style="text-align:center"><div style="font-size:30px;font-weight:800" id="occPct">0%</div><div style="font-size:10px;color:var(--text2)">总车位 100</div></div></div></div>
      <div class="card"><div class="card-title">近7天汇总</div><div style="overflow-x:auto"><table><thead><tr><th>日期</th><th>车次</th><th>收费</th><th>均价</th></tr></thead><tbody id="weekSum"></tbody></table></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="settingsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:center;justify-content:center">
  <div style="background:var(--card);border-radius:var(--radius);padding:24px;width:90%;max-width:640px;max-height:85vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.2)">
    <h3 style="margin-bottom:16px">⚙️ 停车费率设置</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px" id="settingsForm"></div>
    <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">
      <label style="font-size:13px;font-weight:600">免费时长（分钟）：</label>
      <input type="number" id="setFree" min="0" max="120" style="width:100px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:14px;margin-left:8px">
      <span style="font-size:11px;color:var(--text3);margin-left:6px">不超过此时间免费</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-go" onclick="saveSettings()" style="flex:1">💾 保存设置</button>
      <button class="btn btn-outline" onclick="$('settingsModal').style.display='none'" style="flex:1">取消</button>
    </div>
  </div>
</div>

<script>
var P=[{a:'京',n:'北京'},{a:'津',n:'天津'},{a:'冀',n:'河北'},{a:'晋',n:'山西'},{a:'蒙',n:'内蒙古'},{a:'辽',n:'辽宁'},{a:'吉',n:'吉林'},{a:'黑',n:'黑龙江'},{a:'沪',n:'上海'},{a:'苏',n:'江苏'},{a:'浙',n:'浙江'},{a:'皖',n:'安徽'},{a:'闽',n:'福建'},{a:'赣',n:'江西'},{a:'鲁',n:'山东'},{a:'豫',n:'河南'},{a:'鄂',n:'湖北'},{a:'湘',n:'湖南'},{a:'粤',n:'广东'},{a:'桂',n:'广西'},{a:'琼',n:'海南'},{a:'渝',n:'重庆'},{a:'川',n:'四川'},{a:'贵',n:'贵州'},{a:'云',n:'云南'},{a:'藏',n:'西藏'},{a:'陕',n:'陕西'},{a:'甘',n:'甘肃'},{a:'青',n:'青海'},{a:'宁',n:'宁夏'},{a:'新',n:'新疆'}];
var VT=[{id:'car',n:'🚗 小型车',r:5,a:3,c:30,cl:'#3b82f6'},{id:'suv',n:'🚙 SUV',r:6,a:4,c:35,cl:'#6366f1'},{id:'truck',n:'🚚 货车',r:10,a:6,c:50,cl:'#f97316'},{id:'motor',n:'🏍️ 摩托',r:2,a:1,c:10,cl:'#10b981'}];
var liveRates=null; // synced from DB
var CC=['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q','R','S','T','U','V','W','X','Y','Z'];
var sp='京',esp='京',sc='A',esc='A',st='car',nve=false,cm='week',pp=null;

function $(id){return document.getElementById(id);}

// toast
var _tt;
function toast(m,t){var e=$('toast');clearTimeout(_tt);e.textContent=m;e.className='toast '+t+' show';_tt=setTimeout(function(){e.classList.remove('show');},2000);}

// city dropdown
function rc(){
  var h=CC.map(function(c){return'<option value="'+c+'"'+(c===sc?' selected':'')+'>'+c+'</option>';}).join('');
  $('citySel').innerHTML=h;
  $('exitCitySel').innerHTML=CC.map(function(c){return'<option value="'+c+'"'+(c===esc?' selected':'')+'>'+c+'</option>';}).join('');
}
function onCity(){sc=$('citySel').value;}
function onExitCity(){esc=$('exitCitySel').value;}

// validate
function vnum(v,nv){var x=v.toUpperCase().replace(/\s/g,'');if(!x)return{v:false,m:''};if(!/^[A-Z0-9]+$/.test(x))return{v:false,m:'只能字母和数字'};var l=nv?6:5;if(x.length<l)return{v:false,m:'还需'+(l-x.length)+'位'};if(x.length>l)return{v:false,m:'应'+l+'位'};return{v:true,m:'✓'};}
function valIn(){
  var i=$('numIn'),m=$('msgIn'),b=$('btnIn'),l=nve?6:5;
  if(i.value.length>l)i.value=i.value.slice(0,l);
  var r=vnum(i.value,nve);
  i.classList.toggle('err',i.value&&!r.v);
  if(!i.value){m.textContent='格式：'+l+'位数字/字母';m.className='msg';}
  else if(!r.v){m.textContent=r.m;m.className='msg err';}
  else{m.textContent='✓ 格式正确';m.className='msg ok';}
  b.disabled=!r.v;
}
function valOut(){
  var i=$('numOut'),m=$('msgOut'),l=6;
  if(i.value.length>l)i.value=i.value.slice(0,l);
  var r=vnum(i.value,false);
  i.classList.toggle('err',i.value&&!r.v);
  if(!i.value){m.textContent='格式：5位数字/字母';m.className='msg';}
  else if(!r.v){m.textContent=r.m;m.className='msg err';}
  else{m.textContent='✓ 格式正确';m.className='msg ok';}
}

// page switch
function page(p){
  $('pgPark').className='pg'+(p==='park'?' on':'');
  $('pgStat').className='pg'+(p==='stat'?' on':'');
  $('tabPark').style.background=p==='park'?'var(--accent)':'transparent';
  $('tabPark').style.color=p==='park'?'#fff':'var(--text2)';
  $('tabStat').style.background=p==='stat'?'var(--accent)':'transparent';
  $('tabStat').style.color=p==='stat'?'#fff':'var(--text2)';
  if(p==='stat')statLoad();
}
function chartTab(t){
  cm=t;$('ctWeek').style.background=t==='week'?'var(--accent)':'transparent';
  $('ctWeek').style.color=t==='week'?'#fff':'var(--text2)';
  $('ctMonth').style.background=t==='month'?'var(--accent)':'transparent';
  $('ctMonth').style.color=t==='month'?'#fff':'var(--text2)';
  chartLoad();
}

// api
function api(u,b){var o=b?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}:{};return fetch(u,o).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});}

// enter
function enter(){
  var i=$('numIn'),pn=i.value.trim().toUpperCase(),r=vnum(pn,nve);
  if(!r.v){toast(r.m,'err');i.classList.add('err');return;}
  var fp=sp+sc+pn;
  api('/api/enter',{plate:fp,type:st,nev:nve}).then(function(res){
    if(!res.ok){toast(res.msg,'err');return;}
    i.value='';valIn();toast(res.msg,'ok');load();
  }).catch(function(e){toast('连接失败: '+e.message,'err');});
}

// checkout
function checkout(){
  var i=$('numOut'),pn=i.value.trim().toUpperCase(),r=vnum(pn,false);
  if(!r.v){toast(r.m,'err');i.classList.add('err');return;}
  var fp=esp+esc+pn;
  toast('正在结算 '+fp+' ...','warn');
  api('/api/checkout',{plate:fp}).then(function(res){
    if(!res.ok){toast(res.msg,'err');return;}
    var d=res.data;pp={plate:fp,fee:d.fee,exitTime:d.exitTime};
    i.value='';valOut();showFee(d.fee,fp,d.hours,d.type);
  }).catch(function(e){toast('连接失败: '+e.message,'err');});
}
function qexit(plate){
  $('activeEmpty').textContent='正在结算 '+plate+' ...';$('activeEmpty').style.display='block';
  api('/api/checkout',{plate:plate}).then(function(res){
    $('activeEmpty').style.display='none';
    if(!res.ok){toast(res.msg,'err');return;}
    var d=res.data;pp={plate:plate,fee:d.fee,exitTime:d.exitTime};showFee(d.fee,plate,d.hours,d.type);
  }).catch(function(e){toast('连接失败: '+e.message,'err');$('activeEmpty').style.display='none';});
}

function showFee(fee,plate,hours,tid){
  $('feeBox').style.display='block';
  $('feeBox').scrollIntoView({behavior:'smooth'});
  $('feeNum').textContent='¥'+fee.toFixed(2);
  var vt=VT.find(function(t){return t.id===tid;})||VT[0];
  $('feeInfo').textContent=plate+' · 停车 '+fdur(hours);
  var r=Number(vt.r)||5,a=Number(vt.a)||3,c=Number(vt.c)||30;
  $('feeDetail').innerHTML='<div style="display:flex;justify-content:space-between;padding:3px 0"><span>首小时(¥'+r+')</span><strong>¥'+r+'.00</strong></div><div style="display:flex;justify-content:space-between;padding:3px 0"><span>超出 × ¥'+a+'/时</span><strong>¥'+Math.max(0,fee-r)+'.00</strong></div><div style="display:flex;justify-content:space-between;padding:3px 0;font-size:10px;color:var(--text3)"><span>日封顶 ¥'+c+' | 车型 '+vt.n.slice(2)+'</span></div>';
  var ref='TCSF'+Date.now().toString(36).toUpperCase();pp.ref=ref;
  $('qrImg').src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data='+encodeURIComponent('parking|'+plate+'|'+ref+'|¥'+fee)+'&bgcolor=fff&color=1a202c';
  $('qrRef').textContent='商户单号: '+ref;$('qrWrap').style.display='block';$('payBtn').disabled=false;
}

function payOk(){
  if(!pp)return;
  api('/api/confirm',{plate:pp.plate,fee:pp.fee,exitTime:pp.exitTime}).then(function(res){
    if(!res.ok){toast(res.msg,'err');return;}
    toast(res.msg,'ok');$('feeBox').style.display='none';$('payBtn').disabled=true;pp=null;load();
  }).catch(function(e){toast('连接失败: '+e.message,'err');});
}
function payNo(){if(pp)toast('已取消','warn');$('feeBox').style.display='none';pp=null;}

// load tables
function load(){
  Promise.all([api('/api/active'),api('/api/history')]).then(function(r){
    var ac=r[0]&&r[0].ok?r[0].data:[],hi=r[1]&&r[1].ok?r[1].data:[];
    var ab=$('activeBody'),ae=$('activeEmpty');
    if(ac.length===0){ab.innerHTML='';ae.style.display='block';ae.textContent='暂无在场车辆';}
    else{ae.style.display='none';ab.innerHTML=ac.map(function(x){var dur=(Date.now()-new Date(x.entry_time).getTime())/3600000;var nv=x.nev===1||x.nev===true;var vt=VT.find(function(t){return t.id===x.type;})||VT[0];var col=dur>4?'var(--red)':dur>2?'var(--orange)':'var(--green)';return'<tr><td><strong>'+x.plate+'</strong>'+(nv?' <span class="badge green">新能源</span>':'')+'</td><td>'+vt.n.slice(2)+'</td><td>'+ft(x.entry_time)+'</td><td style="color:'+col+'">'+fdur(dur)+'</td><td><button class="btn btn-outline" style="padding:3px 7px;font-size:10px;width:auto" onclick="qexit(\''+x.plate+'\')">结算</button></td></tr>';}).join('');}
    var hb=$('hisBody'),he=$('hisEmpty');
    var rev=hi.slice().reverse().slice(0,50);
    if(rev.length===0){hb.innerHTML='';he.style.display='block';he.textContent='暂无收费记录';}
    else{he.style.display='none';hb.innerHTML=rev.map(function(h){return'<tr><td><strong>'+h.plate+'</strong></td><td>'+ft(h.entry_time)+'</td><td>'+ft(h.exit_time)+'</td><td style="color:var(--green);font-weight:700">¥'+Number(h.fee).toFixed(2)+'</td></tr>';}).join('');}
  }).catch(function(e){$('activeEmpty').textContent='连接失败: '+e.message;});
}

// stats
function statLoad(){
  Promise.all([api('/api/stats'),api('/api/chart?days='+(cm==='week'?7:30)),api('/api/type-dist'),api('/api/peak-hours')]).then(function(r){
    var s=r[0]&&r[0].ok?r[0].data:{},cd=r[1]&&r[1].ok?r[1].data:[],td=r[2]&&r[2].ok?r[2].data:[],ph=r[3]&&r[3].ok?r[3].data:[];
    $('sCars').textContent=s.totalCars||0;$('sFee').textContent='¥'+(s.totalFee||0);
    $('sAvg').textContent='¥'+(s.totalCars?((s.totalFee||0)/s.totalCars).toFixed(2):'0.00');
    var ad=s.avgDur||0;$('sDur').textContent=ad<60?ad+'min':(ad/60).toFixed(1)+'h';
    chartRender(cd);distRender(td);peakRender(ph);ringRender(s.parkingNow||0);weekRender(cd);
  });
}
function chartLoad(){api('/api/chart?days='+(cm==='week'?7:30)).then(function(res){if(res&&res.ok)chartRender(res.data);});}
function chartRender(d){var mf=Math.max.apply(null,d.map(function(x){return x.fee;}).concat([1]));$('feeChart').innerHTML=d.map(function(x){var h=Math.max(2,(x.fee/mf)*130);return'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end"><div style="font-size:10px;color:var(--text2);font-weight:600">¥'+x.fee+'</div><div style="width:60%;max-width:36px;height:'+h+'px;border-radius:5px 5px 0 0;background:linear-gradient(180deg,var(--accent),rgba(59,130,246,.3))"></div><div style="font-size:9px;color:var(--text3)">'+x.label+'</div></div>';}).join('');}
function distRender(d){var dist={};VT.forEach(function(t){dist[t.id]={n:t.n.slice(2),c:0,cl:t.cl};});(d||[]).forEach(function(x){if(dist[x.type])dist[x.type].c=x.cnt;});var tot=Object.values(dist).reduce(function(s,x){return s+x.c;},0)||1;$('typeDist').innerHTML=Object.values(dist).map(function(x){return'<div style="display:flex;align-items:center;gap:8px"><div style="width:9px;height:9px;border-radius:2px;background:'+x.cl+';flex-shrink:0"></div><span style="flex:1;color:var(--text2)">'+x.n+'</span><strong>'+x.c+'辆</strong></div>';}).join('');}
function peakRender(h){var max=Math.max.apply(null,h.concat([1]));$('peakBars').innerHTML=h.map(function(c,i){var bh=Math.max(2,(c/max)*70);return'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end"><div style="width:100%;max-width:28px;height:'+bh+'px;border-radius:3px 3px 0 0;background:'+(c>max*.7?'var(--orange)':'var(--accent3)')+'"></div><div style="font-size:8px;color:var(--text3)">'+i+'</div></div>';}).join('');}
function ringRender(a){var pct=Math.round((a/100)*100),cir=339.292;$('occRing').style.strokeDashoffset=cir-(pct/100)*cir;$('occPct').textContent=pct+'%';$('occPct').style.color=pct>80?'var(--red)':pct>50?'var(--orange)':'var(--green)';}
function weekRender(d){$('weekSum').innerHTML=(d||[]).map(function(r){return'<tr><td>'+r.label+'</td><td>'+r.count+'</td><td style="color:var(--green)">¥'+Number(r.fee).toFixed(2)+'</td><td>'+(r.count?'¥'+(r.fee/r.count).toFixed(2):'--')+'</td></tr>';}).join('');}

// utils
function fdur(h){if(h<1)return Math.round(h*60)+'分钟';var hrs=Math.floor(h),mins=Math.round((h-hrs)*60);return hrs+'小时'+(mins>0?mins+'分':'');}
function ft(ts){var d=new Date(ts);return(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

// select functions
function selProv(a){sp=a;$('pref').textContent=a;renderProvs();rc();}
function selExitProv(a){esp=a;$('exitPref').textContent=a;renderProvs();rc();}
function selType(id){st=id;renderTypes();}
function togNEV(){nve=!nve;$('nevTg').classList.toggle('on',nve);var i=$('numIn');i.placeholder=nve?'123456':'12345';i.value='';valIn();}

function renderProvs(){
  $('provGrid').innerHTML=P.map(function(p){return'<button class="prov-btn'+(p.a===sp?' on':'')+'" onclick="selProv(\''+p.a+'\')">'+p.a+'<span>'+p.n+'</span></button>';}).join('');
  $('exitProvGrid').innerHTML=P.map(function(p){return'<button class="prov-btn'+(p.a===esp?' on':'')+'" onclick="selExitProv(\''+p.a+'\')">'+p.a+'<span>'+p.n+'</span></button>';}).join('');
}
function renderTypes(){
  $('typesRow').innerHTML=VT.map(function(t){return'<button class="type-btn'+(t.id===st?' on':'')+'" onclick="selType(\''+t.id+'\')">'+t.n+'</button>';}).join('');
}

// keyboard
document.addEventListener('keydown',function(e){if(e.ctrlKey||e.metaKey||e.target.tagName==='INPUT')return;var i=P.findIndex(function(p){return p.a===sp;});if(e.key==='ArrowRight'){e.preventDefault();selProv(P[(i+1)%P.length].a);}if(e.key==='ArrowLeft'){e.preventDefault();selProv(P[(i-1+P.length)%P.length].a);}});

// settings modal
function loadSettings(){
  api('/api/settings').then(function(res){
    if(!res.ok||!res.data)return;
    liveRates=res.data;
    VT.forEach(function(t){
      var s=res.data;
      if(s[t.id+'_rate']!=null)t.r=Number(s[t.id+'_rate']);
      if(s[t.id+'_add']!=null)t.a=Number(s[t.id+'_add']);
      if(s[t.id+'_cap']!=null)t.c=Number(s[t.id+'_cap']);
    });
  });
}

function showSettings(){
  $('settingsModal').style.display='flex';
  api('/api/settings').then(function(res){
    if(!res.ok)return;
    var s=res.data;
    var fr=s.free_min!=null?s.free_min:30;
    $('setFree').value=fr;

    var h='';
    VT.forEach(function(t){
      var k=t.id;
      var r=s[k+'_rate']!=null?s[k+'_rate']:t.r;
      var a=s[k+'_add']!=null?s[k+'_add']:t.a;
      var c=s[k+'_cap']!=null?s[k+'_cap']:t.c;
      h+='<div style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px"><div style="font-weight:700;margin-bottom:6px;font-size:13px">'+t.n+'</div><div style="display:flex;gap:6px"><label style="font-size:10px;color:var(--text2);flex:1">首小时(¥)<input id="r_'+k+'" value="'+r+'" style="width:100%;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:13px;text-align:center"></label><label style="font-size:10px;color:var(--text2);flex:1">超出/时(¥)<input id="a_'+k+'" value="'+a+'" style="width:100%;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:13px;text-align:center"></label><label style="font-size:10px;color:var(--text2);flex:1">日封顶(¥)<input id="c_'+k+'" value="'+c+'" style="width:100%;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:13px;text-align:center"></label></div></div>';
    });
    var ds=s.day_start!=null?s.day_start:8;
    var de=s.day_end!=null?s.day_end:20;
    var dr=s.day_rate!=null?s.day_rate:1;
    var nr=s.night_rate!=null?s.night_rate:0.5;
    h+='<div style="grid-column:1/-1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px"><div style="font-weight:700;margin-bottom:6px;font-size:13px">⏰ 时间段费率</div><div style="display:flex;gap:6px;align-items:center;margin-bottom:8px"><span style="font-size:11px;color:var(--text2)">白天</span><input id="setDayStart" value="'+ds+'" style="width:48px;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:13px;text-align:center"><span style="font-size:11px;color:var(--text2)">时 ~ </span><input id="setDayEnd" value="'+de+'" style="width:48px;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:13px;text-align:center"><span style="font-size:11px;color:var(--text2)">时 | 倍率:</span><input id="setDayRate" value="'+dr+'" style="width:48px;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:13px;text-align:center"><span style="font-size:11px;color:var(--text2)">夜间:</span><input id="setNightRate" value="'+nr+'" style="width:48px;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:13px;text-align:center"></div><div style="font-size:10px;color:var(--text3)">例：白天8~20时×1.0，夜间×0.5，跨时段按比例</div></div>';
    $('settingsForm').innerHTML=h;
  });
}

function saveSettings(){
  var frEl=$('setFree');var fr=30;
  if(frEl){var v=parseInt(frEl.value);if(!isNaN(v)&&v>=0)fr=v;}
  var data={free_min:fr};
  VT.forEach(function(t){
    var k=t.id;
    var re=$('r_'+k);if(re){var v=parseFloat(re.value);if(!isNaN(v)&&v>0)data[k+'_rate']=v;else data[k+'_rate']=t.r;}
    var ae=$('a_'+k);if(ae){var v=parseFloat(ae.value);if(!isNaN(v)&&v>=0)data[k+'_add']=v;else data[k+'_add']=t.a;}
    var ce=$('c_'+k);if(ce){var v=parseFloat(ce.value);if(!isNaN(v)&&v>0)data[k+'_cap']=v;else data[k+'_cap']=t.c;}
  });
  var dse=$('setDayStart');if(dse){var v=parseInt(dse.value);if(!isNaN(v))data.day_start=v;}
  var dee=$('setDayEnd');if(dee){var v=parseInt(dee.value);if(!isNaN(v))data.day_end=v;}
  var dre=$('setDayRate');if(dre){var v=parseFloat(dre.value);if(!isNaN(v)&&v>0)data.day_rate=v;}
  var nre=$('setNightRate');if(nre){var v=parseFloat(nre.value);if(!isNaN(v)&&v>=0)data.night_rate=v;}

  api('/api/settings',data).then(function(res){
    if(res.ok){loadSettings();toast('费率已保存生效 free='+fr+'min','ok');$('settingsModal').style.display='none';}
    else toast('保存失败: '+(res.msg||'未知'),'err');
  }).catch(function(e){toast('保存失败: '+e.message,'err');});
}

// init
loadSettings();renderProvs();rc();renderTypes();load();setInterval(load,10000);
</script>
</body>
